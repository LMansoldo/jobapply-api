openapi: 3.0.3
info:
  title: jobapply-api
  description: REST API for job and CV management with LLM-powered tailoring.
  version: 1.0.0

servers:
  - url: https://jobapply-api-production.up.railway.app
    description: Production
  - url: http://localhost:3000
    description: Local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        cv:
          type: string
          nullable: true
          description: ID of the user's CV, null if not yet created

    Job:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        company:
          type: string
        location:
          type: string
        description:
          type: string
        tailoredDescription:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        url:
          type: string
        salary:
          type: string
        status:
          type: string
          enum: [open, closed, applied]
        createdAt:
          type: string
          format: date-time

    SkillGroup:
      type: object
      required: [label, items]
      properties:
        label:
          type: string
          example: Frameworks & Libraries
        items:
          type: array
          items:
            type: string
          example: [React, Next.js, Node.js]

    Experience:
      type: object
      properties:
        role:
          type: string
        company:
          type: string
        location:
          type: string
        period:
          type: string
          example: "01/2022 - 12/2024"
        context:
          type: string
          description: One sentence describing the team, product, or context
          example: Led front-end development for a B2B SaaS platform serving 200+ enterprise clients.
        highlights:
          type: array
          description: Achievement bullets with metrics
          items:
            type: string
          example: ["Reduced page load time by 40% via code splitting, improving Lighthouse score from 62 to 94."]

    Education:
      type: object
      properties:
        degree:
          type: string
          example: Bachelor's
        field:
          type: string
          example: Computer Science
        institution:
          type: string
        location:
          type: string
        period:
          type: string
          example: "01/2018 - 12/2022"
        notes:
          type: string
          description: Optional relevant coursework, thesis, or GPA

    Language:
      type: object
      required: [language, level]
      properties:
        language:
          type: string
          example: English
        level:
          type: string
          example: Fluent
        score:
          type: string
          example: TOEFL 105

    Certification:
      type: object
      required: [name, organization]
      properties:
        name:
          type: string
          example: AWS Certified Solutions Architect
        organization:
          type: string
          example: Amazon Web Services
        date:
          type: string
          example: "03/2024"

    Project:
      type: object
      required: [name]
      properties:
        name:
          type: string
        url:
          type: string
        description:
          type: string
        highlights:
          type: array
          items:
            type: string

    TailoredVersion:
      type: object
      properties:
        jobId:
          type: string
        tailoredContent:
          type: string
        createdAt:
          type: string
          format: date-time

    CVLocaleVersion:
      type: object
      properties:
        locale:
          type: string
          enum: [en, pt-BR]
        objective:
          type: string
        summary:
          type: string
        skills:
          type: array
          items:
            $ref: '#/components/schemas/SkillGroup'
        experience:
          type: array
          items:
            $ref: '#/components/schemas/Experience'
        education:
          type: array
          items:
            $ref: '#/components/schemas/Education'

    CV:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        location:
          type: string
        linkedin:
          type: string
        github:
          type: string
        portfolio:
          type: string
        objective:
          type: string
        summary:
          type: string
        skills:
          type: array
          items:
            $ref: '#/components/schemas/SkillGroup'
        experience:
          type: array
          items:
            $ref: '#/components/schemas/Experience'
        education:
          type: array
          items:
            $ref: '#/components/schemas/Education'
        languages:
          type: array
          items:
            $ref: '#/components/schemas/Language'
        certifications:
          type: array
          items:
            $ref: '#/components/schemas/Certification'
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        tailoredVersions:
          type: array
          items:
            $ref: '#/components/schemas/TailoredVersion'
        localeVersions:
          type: array
          items:
            $ref: '#/components/schemas/CVLocaleVersion'
        updatedAt:
          type: string
          format: date-time

    Voucher:
      type: object
      properties:
        _id:
          type: string
        code:
          type: string
        name:
          type: string
        source_url:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
        discount_percentage:
          type: number
        access_type:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    PublishedCV:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
        public_id:
          type: string
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        location:
          type: string
        linkedin:
          type: string
        github:
          type: string
        portfolio:
          type: string
        objective:
          type: string
        summary:
          type: string
        skills:
          type: array
          items:
            $ref: '#/components/schemas/SkillGroup'
        experience:
          type: array
          items:
            $ref: '#/components/schemas/Experience'
        education:
          type: array
          items:
            $ref: '#/components/schemas/Education'
        languages:
          type: array
          items:
            $ref: '#/components/schemas/Language'
        certifications:
          type: array
          items:
            $ref: '#/components/schemas/Certification'
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        published_at:
          type: string
          format: date-time

    PlatformScore:
      type: object
      properties:
        platform:
          type: string
          example: Greenhouse
        score:
          type: number
          example: 78
        passed:
          type: boolean
        missingRequired:
          type: array
          items:
            type: string
        missingPreferred:
          type: array
          items:
            type: string
        flags:
          type: array
          items:
            type: string
        notes:
          type: array
          items:
            type: string

    RephraseSuggestion:
      type: object
      properties:
        from:
          type: string
          description: Original phrase in the CV
          example: "responsible for managing"
        to:
          type: string
          description: Suggested replacement aligned with the job description
          example: "led end-to-end delivery of"

    KeywordPhrase:
      type: object
      properties:
        keyword:
          type: string
          description: The missing keyword or skill
          example: "Kubernetes"
        phrase:
          type: string
          description: Ready-to-use CV bullet point that naturally incorporates the keyword
          example: "Deployed and managed microservices on Kubernetes clusters, reducing infrastructure costs by 30%."

    RemoveSuggestion:
      type: object
      properties:
        section:
          type: string
          description: CV section containing the item to remove
          example: "skills"
        item:
          type: string
          description: Specific skill, bullet, role, or element to remove or de-emphasize
          example: "Adobe Photoshop"
        reason:
          type: string
          description: Why this item hurts the application for this specific role
          example: "Unrelated to the engineering role and takes up space that could highlight backend skills."

    InterviewStory:
      type: object
      properties:
        jdRequirement:
          type: string
          description: The specific requirement from the job description this story addresses
          example: "Experience leading cross-functional teams in an agile environment"
        story:
          type: string
          description: STAR-format narrative paragraph bridging CV experience to the JD requirement
          example: "At Acme Corp, I inherited a team of 6 engineers spread across three time zones after a sudden reorg (Situation). My task was to ship the new payments module within 10 weeks without slipping the existing roadmap (Task). I introduced bi-weekly cross-timezone syncs and a shared kanban board to surface blockers early, and partnered with product to re-scope two low-priority items (Action). We shipped on time with zero P1 incidents in the first 30 days, and the team's engagement score rose from 62 to 78 in the next quarterly survey (Result)."

    InterviewPrep:
      type: object
      properties:
        stories:
          type: array
          description: STAR-format stories bridging CV experience to JD requirements
          items:
            $ref: '#/components/schemas/InterviewStory'
        overallPositioning:
          type: string
          description: Coaching statement on how to pitch yourself for this role
          example: "Position yourself as a senior full-stack engineer who has already shipped at scale in fintech, not just a generalist. Lead with your payments work at Acme and your track record of owning reliability — those map directly to what this JD is asking for."

    ATSReport:
      type: object
      properties:
        universalScore:
          type: number
          description: Average score (0-100) across all ATS platforms
          example: 74
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/PlatformScore'
        semanticGaps:
          type: array
          description: High-level content gaps identified by semantic analysis
          items:
            type: string
        optimalTemplate:
          type: object
          properties:
            sectionsOrder:
              type: array
              description: Recommended CV section order
              items:
                type: string
              example: [contact, objective, summary, skills, expertise, experience, education, languages]
            keywordsToAdd:
              type: array
              description: Keywords missing from the CV that should be added
              items:
                type: string
            keywordPhrases:
              type: array
              description: 10 ready-to-use CV bullet point phrases that incorporate the top missing keywords
              items:
                $ref: '#/components/schemas/KeywordPhrase'
            keywordsToRephrase:
              type: array
              description: Phrases in the CV that should be reworded to match the job description
              items:
                $ref: '#/components/schemas/RephraseSuggestion'
            formatFixes:
              type: array
              description: Format issues detected (dates, columns, encoding, etc.)
              items:
                type: string
        tips:
          type: array
          description: Prioritized actionable recommendations
          items:
            type: object
            properties:
              priority:
                type: string
                enum: [critical, high, medium]
              tip:
                type: string
              applicableTo:
                type: array
                description: ATS platforms this tip applies to
                items:
                  type: string
        removeSuggestions:
          type: array
          description: CV items to remove or de-emphasize because they are irrelevant or counterproductive for this role
          items:
            $ref: '#/components/schemas/RemoveSuggestion'

    Error:
      type: object
      properties:
        message:
          type: string

paths:

  # ─── USERS ────────────────────────────────────────────────────────────────

  /users/register:
    post:
      tags: [Users]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: Lucas
                email:
                  type: string
                  example: lucas@test.com
                password:
                  type: string
                  minLength: 8
                  example: secret123
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Required fields missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/login:
    post:
      tags: [Users]
      summary: Login — returns JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: lucas@test.com
                password:
                  type: string
                  example: secret123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Required fields missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── JOBS ─────────────────────────────────────────────────────────────────

  /jobs/bulk:
    post:
      tags: [Jobs]
      summary: Bulk create jobs
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jobs]
              properties:
                jobs:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [title, company, description]
                    properties:
                      title:
                        type: string
                        example: Backend Engineer
                      company:
                        type: string
                        example: Acme
                      location:
                        type: string
                        example: Remote
                      description:
                        type: string
                        example: Build and maintain REST APIs...
                      tags:
                        type: array
                        items:
                          type: string
                        example: [node, mongodb]
                      url:
                        type: string
                      salary:
                        type: string
                        example: $80,000 - $100,000
                      status:
                        type: string
                        enum: [open, closed, applied]
                        default: open
      responses:
        '201':
          description: Jobs inserted
          content:
            application/json:
              schema:
                type: object
                properties:
                  inserted:
                    type: integer
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
        '400':
          description: jobs must be a non-empty array
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /jobs:
    get:
      tags: [Jobs]
      summary: List jobs with filters and pagination
      security:
        - bearerAuth: []
      parameters:
        - name: title
          in: query
          schema:
            type: string
          description: Partial match on title (case-insensitive)
        - name: company
          in: query
          schema:
            type: string
          description: Partial match on company
        - name: location
          in: query
          schema:
            type: string
          description: Partial match on location
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed, applied]
        - name: tags
          in: query
          schema:
            type: string
          description: Comma-separated tags (e.g. node,mongodb)
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, oldest]
            default: newest
          description: Sort by creation date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Job list
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /jobs/{id}:
    get:
      tags: [Jobs]
      summary: Get job by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job found
          content:
            application/json:
              schema:
                type: object
                properties:
                  job:
                    $ref: '#/components/schemas/Job'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Jobs]
      summary: Delete a job
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Job deleted
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /jobs/{id}/tailor-description:
    post:
      tags: [Jobs]
      summary: Rewrite job description via LLM
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Description rewritten and saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  tailoredDescription:
                    type: string
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: LLM service error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── CV ───────────────────────────────────────────────────────────────────

  /cv:
    post:
      tags: [CV]
      summary: Create CV (one per user)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email]
              properties:
                fullName:
                  type: string
                  example: Lucas Mansoldo de Andrade
                email:
                  type: string
                  example: lucas@test.com
                phone:
                  type: string
                  example: "+55 21 98030-3612"
                location:
                  type: string
                  example: Canoas, Brazil
                linkedin:
                  type: string
                github:
                  type: string
                portfolio:
                  type: string
                summary:
                  type: string
                skills:
                  type: array
                  items:
                    $ref: '#/components/schemas/SkillGroup'
                experience:
                  type: array
                  items:
                    $ref: '#/components/schemas/Experience'
                education:
                  type: array
                  items:
                    $ref: '#/components/schemas/Education'
                languages:
                  type: array
                  items:
                    $ref: '#/components/schemas/Language'
                certifications:
                  type: array
                  items:
                    $ref: '#/components/schemas/Certification'
                projects:
                  type: array
                  items:
                    $ref: '#/components/schemas/Project'
      responses:
        '201':
          description: CV created
          content:
            application/json:
              schema:
                type: object
                properties:
                  cv:
                    $ref: '#/components/schemas/CV'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already has a CV
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /cv/{id}:
    get:
      tags: [CV]
      summary: Get CV by ID (owner only). Pass ?locale=en or ?locale=pt-BR to get a localized version.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: locale
          in: query
          required: false
          schema:
            type: string
            enum: [en, pt-BR]
          description: Return the CV with the specified locale version merged on top
      responses:
        '200':
          description: CV found
          content:
            application/json:
              schema:
                type: object
                properties:
                  cv:
                    $ref: '#/components/schemas/CV'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: CV not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags: [CV]
      summary: Update CV (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                location:
                  type: string
                linkedin:
                  type: string
                github:
                  type: string
                portfolio:
                  type: string
                summary:
                  type: string
                skills:
                  type: array
                  items:
                    $ref: '#/components/schemas/SkillGroup'
                experience:
                  type: array
                  items:
                    $ref: '#/components/schemas/Experience'
                education:
                  type: array
                  items:
                    $ref: '#/components/schemas/Education'
                languages:
                  type: array
                  items:
                    $ref: '#/components/schemas/Language'
                certifications:
                  type: array
                  items:
                    $ref: '#/components/schemas/Certification'
                projects:
                  type: array
                  items:
                    $ref: '#/components/schemas/Project'
      responses:
        '200':
          description: CV updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  cv:
                    $ref: '#/components/schemas/CV'
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: CV not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [CV]
      summary: Delete CV (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: CV deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: CV deleted
        '401':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: CV not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /cv/{id}/version/{locale}:
    put:
      tags: [CV]
      summary: Create or update a localized version of the CV (en or pt-BR)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: locale
          in: path
          required: true
          schema:
            type: string
            enum: [en, pt-BR]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                objective:
                  type: string
                summary:
                  type: string
                skills:
                  type: array
                  items:
                    $ref: '#/components/schemas/SkillGroup'
                experience:
                  type: array
                  items:
                    $ref: '#/components/schemas/Experience'
                education:
                  type: array
                  items:
                    $ref: '#/components/schemas/Education'
      responses:
        '200':
